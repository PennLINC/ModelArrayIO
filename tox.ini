[tox]
requires =
  tox>=4
  tox-uv
envlist =
  py3{11,12,13,14}-latest
  py311-min
skip_missing_interpreters = true

[gh-actions]
python =
  3.11: py311
  3.12: py312
  3.13: py313
  3.14: py314

[gh-actions:env]
DEPENDS =
  min: min
  latest: latest

[testenv]
description = Pytest with coverage (excludes network S3 tests)
labels = test
setenv =
  COVERAGE_FILE = {toxinidir}/.tox/.coverage.{envname}
pass_env =
  LOGNAME
  USER
  LNAME
  USERNAME
  PY_COLORS
  FORCE_COLOR
  NO_COLOR
  CLICOLOR
  CLICOLOR_FORCE
  PYTHON_GIL
extras =
  test

runner =
  !min: uv-venv-lock-runner
  min: uv-venv-runner
uv_resolution =
  min: lowest-direct

commands =
  pytest -m "not s3" --cov=modelarrayio --cov-report=term-missing --cov-report=xml {posargs:tests}

[testenv:lint]
runner = uv-venv-lock-runner
extras =
  test
commands =
  ruff check src tests
  ruff format --check src tests
